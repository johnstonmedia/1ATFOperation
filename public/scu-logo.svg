<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 460" width="512" height="460" role="img" aria-label="Shore Cadet Unit crest">
  <defs>
    <linearGradient id="ribbon" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8c97c9"/>
      <stop offset="1" stop-color="#5b6aa8"/>
    </linearGradient>
  </defs>
  <!-- Mitre body -->
  <path d="M256 36 L150 250 Q256 290 362 250 Z" fill="#e9ecf4" stroke="#26306b" stroke-width="8"/>
  <!-- Mitre band -->
  <path d="M168 214 Q256 252 344 214 L356 250 Q256 292 156 250 Z" fill="#3a4794" stroke="#26306b" stroke-width="6"/>
  <!-- Cross -->
  <g fill="#2a3478" stroke="#1b2356" stroke-width="3">
    <rect x="246" y="2" width="20" height="46" rx="4"/>
    <rect x="228" y="16" width="56" height="18" rx="4"/>
  </g>
  <!-- Lappets -->
  <path d="M150 250 Q70 250 60 330 Q120 320 150 300 Z" fill="#3a4794" stroke="#26306b" stroke-width="6"/>
  <path d="M362 250 Q442 250 452 330 Q392 320 362 300 Z" fill="#3a4794" stroke="#26306b" stroke-width="6"/>
  <!-- Jewels -->
  <circle cx="256" cy="120" r="11" fill="#fff" stroke="#26306b" stroke-width="4"/>
  <circle cx="256" cy="180" r="11" fill="#fff" stroke="#26306b" stroke-width="4"/>
  <rect x="246" y="225" width="20" height="20" fill="#c0392b" stroke="#26306b" stroke-width="3" transform="rotate(45 256 235)"/>
  <!-- Red M / herald devices -->
  <g fill="#b5232b" stroke="#26306b" stroke-width="5">
    <path d="M150 300 l34 0 l0 60 l-34 0 Z"/>
    <path d="M226 300 l34 0 l0 60 l-34 0 Z"/>
    <path d="M298 300 l34 0 l0 60 l-34 0 Z"/>
  </g>
  <!-- Ribbon -->
  <path d="M40 360 Q256 408 472 360 L472 408 Q256 452 40 408 Z" fill="url(#ribbon)" stroke="#26306b" stroke-width="8"/>
  <text x="256" y="394" text-anchor="middle" font-family="Georgia, serif" font-size="30" letter-spacing="3" fill="#1b2356" font-weight="700">LUCET PER MINISTERIUM</text>
</svg>
