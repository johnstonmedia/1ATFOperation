<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>1ATF // routing…</title>
    <!--
      GitHub Pages has no server-side rewrites, so a direct visit to a deep URL
      like /1ATFOperation/Classified would 404. This single-page-app redirect
      (technique by Rafael Pedicini) rewrites the path into a query string and
      bounces to index.html, where a snippet restores the real URL before the
      router boots. pathSegmentsToKeep = 1 keeps the /<repo> project-page prefix.
    -->
    <script>
      var pathSegmentsToKeep = 1
      var l = window.location
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') +
          '/?/' +
          l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash,
      )
    </script>
  </head>
  <body></body>
</html>
